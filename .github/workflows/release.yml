name: Release

# Tag-driven releases. Push a ``v*`` tag and this workflow takes over:
# build a multi-arch image (amd64 + arm64), push it to both GHCR
# (``ghcr.io/<repo>``) and Docker Hub (``${DOCKER_USER}/layerloupe``)
# under the semver / major.minor / ``latest`` tags, and open a GitHub
# Release with auto-generated notes.
#
# Pre-release tags (``v0.1.0-rc1``, ``-alpha.2`` …) are detected by the
# presence of a hyphen in the tag name and are NOT tagged as ``latest``.
#
# Cutting a release is two commands:
#
#     git tag v0.1.0
#     git push --tags

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to ghcr.io

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKER_USER }}/layerloupe
  # Opt JavaScript actions into Node.js 24 ahead of the GitHub-mandated
  # 2026-06-02 default switch (Node 20 is removed entirely 2026-09-16).
  # Catches any Node-24 incompatibility now instead of on the day it's forced.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build, push, and release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so release-notes can diff against the prior tag

      # Logins MUST happen before ``setup-buildx-action`` when the cloud
      # driver is in play — buildx talks to the Docker Build Cloud API
      # using the docker config produced by ``docker/login-action``, and
      # without an authenticated context the cloud endpoint returns 403.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Buildx (Docker Build Cloud)
        # Native amd64 + arm64 builders behind the cloud endpoint — no
        # QEMU emulation tax on the runner, and the shared remote cache
        # is automatic (so we don't configure type=gha cache below).
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "hyneklipa/layerloupe"

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Same tag set is applied to both image names — one build, one
          # push step, two registries. Listing both here is what wires
          # multi-registry publishing in build-push-action below.
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          # ``flavor.latest=auto`` keeps ``:latest`` off pre-release tags
          # (anything containing a ``-`` per semver pattern).
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LayerLoupe ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          # GitHub considers any tag containing ``-`` (rc, alpha, beta) a pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Surface where to grab the image right in the release body.
          append_body: true
          body: |
            ### Container image

            Pull from GHCR:

            ```bash
            docker pull ${{ env.GHCR_IMAGE }}:${{ github.ref_name }}
            ```

            …or from Docker Hub:

            ```bash
            docker pull ${{ env.DOCKERHUB_IMAGE }}:${{ github.ref_name }}
            ```

            Multi-arch: `linux/amd64` + `linux/arm64`.